version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data          # persist ChromaDB between restarts
      - ./utils:/app/utils        # unit JSON files
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
